name: Manage Files

on:
  issues:
    types: [labeled]

jobs:
  delete-file:
    if: contains(github.event.issue.labels.*.name, 'delete-file')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Extract path and delete
        run: |
          FILE_PATH=$(echo "${{ github.event.issue.body }}" | grep -oP '(?<=path: ).*' | head -1 | tr -d '\r')
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git rm "$FILE_PATH"
          git commit -m "chore: delete $FILE_PATH (issue #${{ github.event.issue.number }})"
          git push
      - name: Close issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, body: `✅ Deleted`
            });
            await github.rest.issues.update({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, state: 'closed'
            });

  update-file:
    if: contains(github.event.issue.labels.*.name, 'update-file')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Extract path and content, then update
        run: |
          BODY=$(cat << 'ISSUE_BODY'
          ${{ github.event.issue.body }}
          ISSUE_BODY
          )
          FILE_PATH=$(echo "$BODY" | grep -oP '(?<=path: ).*' | head -1 | tr -d '\r')
          CONTENT=$(echo "$BODY" | sed -n '/^```content$/,/^```$/{ /^```/d; p }')
          mkdir -p "$(dirname "$FILE_PATH")"
          echo "$CONTENT" > "$FILE_PATH"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$FILE_PATH"
          git commit -m "chore: update $FILE_PATH (issue #${{ github.event.issue.number }})"
          git push
      - name: Close issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, body: `✅ Updated`
            });
            await github.rest.issues.update({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, state: 'closed'
            });

  get-file-sha:
    if: contains(github.event.issue.labels.*.name, 'get-file-sha')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Get SHAs for all paths in issue body
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p verification
          # Read all paths from issue body (one per line after "path: ")
          PATHS=$(echo "${{ github.event.issue.body }}" | grep -oP '(?<=path: ).*' | tr -d '\r')
          OUTPUT="{"
          FIRST=true
          while IFS= read -r FILE_PATH; do
            [ -z "$FILE_PATH" ] && continue
            SHA=$(gh api repos/${{ github.repository }}/contents/$FILE_PATH --jq '.sha' 2>/dev/null || echo "not_found")
            if [ "$FIRST" = true ]; then FIRST=false; else OUTPUT="$OUTPUT,"; fi
            OUTPUT="$OUTPUT\"$(echo $FILE_PATH | tr '/' '_')\": {\"path\": \"$FILE_PATH\", \"sha\": \"$SHA\"}"
          done <<< "$PATHS"
          OUTPUT="$OUTPUT, \"issue\": ${{ github.event.issue.number }}}"
          echo "$OUTPUT" > verification/last_sha.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add verification/last_sha.json
          git commit -m "chore: write SHAs (issue #${{ github.event.issue.number }})"
          git push
      - name: Close issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, body: `✅ SHAs written to verification/last_sha.json`
            });
            await github.rest.issues.update({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, state: 'closed'
            });
