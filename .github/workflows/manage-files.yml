name: Manage Files

on:
  issues:
    types: [labeled]

jobs:
  delete-file:
    if: contains(github.event.issue.labels.*.name, 'delete-file')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract path and delete
        run: |
          FILE_PATH=$(echo "${{ github.event.issue.body }}" | grep -oP '(?<=path: ).*' | head -1 | tr -d '\r')
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git rm "$FILE_PATH"
          git commit -m "chore: delete $FILE_PATH (issue #${{ github.event.issue.number }})"
          git push

      - name: Close issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `✅ Deleted`
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed'
            });
